<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
    <style>
        .bg { fill: #1e1e1e; }
        .subgraph-rect { fill: #2d2d2d; stroke: #555; stroke-width: 1; stroke-dasharray: 4; }
        .node-rect { fill: #333; stroke-width: 2; }
        .box-fe { stroke: #24c8db; }
        .box-rs { stroke: #ce412b; }
        .box-py { stroke: #ffd43b; }
        .text-title { font-family: 'Segoe UI', sans-serif; font-size: 16px; font-weight: bold; fill: #24c8db; }
        .text-sub { font-family: 'Segoe UI', sans-serif; font-size: 12px; font-weight: bold; fill: #888; }
        .text-node { font-family: 'Segoe UI', sans-serif; font-size: 14px; font-weight: bold; fill: #ffffff; }
        .text-edge { font-family: 'Segoe UI', sans-serif; font-size: 11px; fill: #aaaaaa; }
        .arrow-dash { stroke: #aaaaaa; stroke-width: 1.5; stroke-dasharray: 4 2; fill: none; }
        .arrow-head { fill: #aaaaaa; }
    </style>

    <rect width="800" height="400" rx="10" class="bg" />
    <text x="400" y="30" text-anchor="middle" class="text-title">TAURI MCP FLOWCHART ARCHITECTURE</text>

    <defs>
        <marker id="head" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" class="arrow-head" />
        </marker>
    </defs>

    <rect x="30" y="80" width="160" height="240" rx="8" class="subgraph-rect" />
    <text x="110" y="105" text-anchor="middle" class="text-sub">Frontend Layer</text>
    <rect x="50" y="170" width="120" height="50" rx="5" class="node-rect box-fe" />
    <text x="110" y="200" text-anchor="middle" class="text-node">React UI</text>

    <rect x="250" y="80" width="160" height="240" rx="8" class="subgraph-rect" />
    <text x="330" y="105" text-anchor="middle" class="text-sub">Tauri Core Layer</text>
    <rect x="270" y="170" width="120" height="50" rx="5" class="node-rect box-rs" />
    <text x="330" y="200" text-anchor="middle" class="text-node">Rust Backend</text>

    <rect x="470" y="80" width="300" height="240" rx="8" class="subgraph-rect" />
    <text x="620" y="105" text-anchor="middle" class="text-sub">AI Sidecar Layer</text>
    
    <rect x="490" y="170" width="120" height="50" rx="5" class="node-rect box-py" />
    <text x="550" y="200" text-anchor="middle" class="text-node">Python Sidecar</text>
    
    <rect x="635" y="170" width="120" height="50" rx="5" class="node-rect box-py" />
    <text x="695" y="200" text-anchor="middle" class="text-node">MCP Server</text>

    <path d="M 170 185 L 260 185" class="arrow-dash" marker-end="url(#head)" />
    <text x="215" y="180" text-anchor="middle" class="text-edge">invoke()</text>

    <path d="M 390 185 L 480 185" class="arrow-dash" marker-end="url(#head)" />
    <text x="435" y="180" text-anchor="middle" class="text-edge">spawn sidecar</text>

    <path d="M 550 170 Q 590 140 635 170" class="arrow-dash" marker-end="url(#head)" />
    <text x="592" y="145" text-anchor="middle" class="text-edge">MCP Protocol</text>

    <path d="M 635 220 Q 590 250 550 220" class="arrow-dash" marker-end="url(#head)" />
    <text x="592" y="255" text-anchor="middle" class="text-edge">Tool Response</text>

    <path d="M 490 210 L 400 210" class="arrow-dash" marker-end="url(#head)" />
    <text x="445" y="225" text-anchor="middle" class="text-edge">stdout JSON</text>

    <path d="M 270 210 L 180 210" class="arrow-dash" marker-end="url(#head)" />
    <text x="225" y="225" text-anchor="middle" class="text-edge">Return Result</text>

</svg>