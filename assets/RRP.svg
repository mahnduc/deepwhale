<svg width="900" height="650" viewBox="0 0 900 650" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .container {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      gap: 25px;
      padding: 30px;
      background: #18181B;
      border-radius: 16px;
      height: calc(100% - 60px);
    }
    .subgraph {
      border: 1px solid #3F3F46;
      border-radius: 12px;
      padding: 20px;
      background: #27272A;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .subgraph-title {
      font-weight: 700;
      font-size: 12px;
      color: #A1A1AA;
      margin-bottom: 15px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .node-group {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }
    .node {
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      transition: all 0.2s ease;
      border: 1px solid rgba(255,255,255,0.1);
      color: #FAFAFA;
    }
    .frontend { background: rgba(34, 211, 238, 0.15); border-color: #22D3EE; color: #22D3EE; }
    .rust { background: rgba(167, 139, 250, 0.15); border-color: #A78BFA; color: #A78BFA; }
    .python { background: rgba(251, 191, 36, 0.15); border-color: #FBBF24; color: #FBBF24; }
    .binary { background: #09090B; border-color: #4ADE80; color: #4ADE80; font-family: 'JetBrains Mono', monospace; }
    .arrow-text { font-size: 11px; fill: #A1A1AA; font-weight: 600; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#52525B" />
    </marker>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <foreignObject x="0" y="0" width="900" height="650">
    <div xmlns="http://www.w3.org/1999/xhtml" class="container">
      <div class="subgraph">
        <div class="subgraph-title">[app]/src - Frontend</div>
        <div class="node-group">
          <div class="node frontend">UI Components: React</div>
          <div class="node frontend">Web Logic / State Management</div>
        </div>
      </div>

      <div class="subgraph">
        <div class="subgraph-title">[app]/src-tauri - Rust Orchestrator</div>
        <div class="node-group" style="flex-direction: column; align-items: flex-start;">
          <div class="node rust">main.rs: Command Handlers</div>
          <div class="node rust">Tauri Sidecar API</div>
          <div class="subgraph" style="width: 320px; background: #18181B; border: 1px solid #4ADE80;">
            <div class="subgraph-title" style="color: #4ADE80; font-size: 10px;">binaries/</div>
            <div class="node binary">backend-python-target.exe</div>
          </div>
        </div>
      </div>

      <div class="subgraph">
        <div class="subgraph-title">[app]/backend-python - Logic Gốc</div>
        <div class="node-group">
          <div class="node python">Source code .py</div>
          <div class="node python">PyInstaller</div>
        </div>
      </div>
    </div>
  </foreignObject>

  <g>
    <path d="M 220 135 L 220 190" stroke="#52525B" stroke-width="2" marker-end="url(#arrowhead)" />
    <text x="230" y="165" class="arrow-text">invoke()</text>

    <path d="M 180 345 L 180 395" stroke="#52525B" stroke-width="2" marker-end="url(#arrowhead)" />
    <text x="190" y="375" class="arrow-text">spawn process</text>

    <path d="M 500 520 C 750 520 750 420 480 420" stroke="#52525B" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowhead)" fill="none" />
    <text x="600" y="490" class="arrow-text">Build Pipeline</text>
  </g>
</svg>