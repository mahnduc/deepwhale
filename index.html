<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Agent Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
  <style>
    /* Đảm bảo biểu đồ có khoảng cách hợp lý và căn giữa */
    .mermaid {
      display: flex;
      justify-content: center;
      margin-top: 20px;
      background-color: transparent;
    }
  </style>
</head>

<body>
  <div id="app">Loading...</div>

  <script src="//cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>

  <script>
    // 2. Khởi tạo cấu hình Mermaid
    mermaid.initialize({
      startOnLoad: false,
      theme: 'base',
      flowchart: {
        htmlLabels: true,
        useMaxWidth: true
      }
    });

    window.$docsify = {
      name: 'Agent Documentation',
      repo: 'https://github.com/mahnduc',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      // 3. Renderer tùy chỉnh để Docsify không can thiệp vào mã nguồn Mermaid
      markdown: {
        renderer: {
          code: function (code, lang) {
            if (lang === "mermaid") {
              return '<div class="mermaid">' + code + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      }
    };
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>

  <script>
    // 5. Plugin xử lý việc render lại Mermaid mỗi khi chuyển trang
    (function () {
      const mermaidPlugin = function (hook, vm) {
        hook.doneEach(function () {
          // Xóa các thuộc tính data-processed để Mermaid vẽ lại từ đầu
          const elements = document.querySelectorAll('.mermaid');
          elements.forEach(el => {
            el.removeAttribute('data-processed');
          });

          // Chạy lệnh render chính xác cho Mermaid v10
          mermaid.run({
            querySelector: '.mermaid'
          }).catch(err => console.error("Mermaid Error:", err));
        });
      };

      window.$docsify.plugins = [].concat(mermaidPlugin, window.$docsify.plugins || []);
    })();
  </script>

</body>

</html>
